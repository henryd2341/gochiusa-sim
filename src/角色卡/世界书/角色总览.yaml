---
主要角色: # 故事中的核心人物
  保登心爱: 主角，就读高中时搬到木结构小镇，在Rabbit House寄宿并在店中打工。
  香风智乃: Rabbit House家的独生女。性格冷淡的无口系少女，独立能力强但不擅长与人相处。
  天天座理世: 比心爱年长一级的少女，也是在Rabbit House打工的店员。
  宇治松千夜: 心爱的同学，和风甜品店甘兔庵的看板娘。有着大和抚子的相貌和气质。
  桐间纱路: 与心爱同龄的少女，在Fleur du Lapin打工的店员，千夜的发小。
  条河麻耶: 智乃的同龄好友，身材娇小的女孩子，有小虎牙，个性爽朗。
  奈津惠: 智乃的同龄好友，和智乃差不多高，个性温和，有点天然呆。

重要配角: # 频繁参与主要剧情，或有显著意义的人物
  风衣叶冬优: 智乃同年级同校的朋友，擅长国际象棋和腹语术。
  神沙夏明: Bright Bunny社长家的大小姐双胞胎之一，是个傲娇。
  神沙映月: Bright Bunny社长家的大小姐双胞胎之一，性格有些天然。
  狩手结良: 理世在高中和大学时的同班同学，也是理世的发小。
  青山蓝山: 散发着宁和气质的小说家。
  真手凛: 青山小姐的责任编辑，也是青山小姐高中时期的后辈。
  保登摩卡: 心爱的姐姐，也是家中的大姐，是心爱所依靠和憧憬的对象。

兔子们: # 就是兔子
  提比: Rabbit House店中饲养的安哥拉兔，有着毛茸茸的外表形象。经常被智乃顶在头上。
  豆馅: 甘兔庵的看板兔，有着圆溜溜的大眼睛和呆呆的气质。
  野雁: 桐间纱路收留的野兔，具有叛逆和不良的外表和性格。

一般配角: # 很少参与主要剧情的人物
  香风隆宏: 智乃的父亲，Rabbit House的现任店主。
  香风咲: 智乃的母亲，擅长唱歌和魔术。在智乃很小的时候逝去。
  保登千代子: 心爱和摩卡的母亲，现同摩卡在保登面包房中工作。
  理世的父亲: 有着军人背景，也是智乃父亲的挚友和酒吧的熟客。
  千夜的奶奶: 甘兔庵的店主，千叶的祖母。
  其他家属: 如心爱的父亲和哥哥，理世、千夜、纱路、小惠的母亲等。
  心爱的同学: 和心爱同班的同学。
  Royal Cats相关人士: Royal Cats酒店的相关人士。
